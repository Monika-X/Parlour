<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Parlour Salon & Spa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { DEFAULT: '#c9a05a', light: '#e8c98a', dark: '#a07a38' },
            rose: { DEFAULT: '#d4829a' },
            dark: { DEFAULT: '#0f0d1a', 2: '#1a1626', 3: '#241f35', 4: '#2e2845' }
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="bg-dark text-gray-100 flex flex-col min-h-screen relative overflow-x-hidden">

  <!-- BACKGROUND ORBS -->
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="orb w-96 h-96 bg-gold/10 top-0 -left-20"></div>
    <div class="orb w-72 h-72 bg-rose/10 bottom-0 right-0" style="animation-delay:4s"></div>
  </div>

  <main class="flex-1 flex flex-col justify-center relative z-10 w-full px-5 py-20">
    <div class="flex items-center justify-center w-full">
      <div class="w-full max-w-sm">
        <div class="glass-card p-10 text-center">
            <div class="text-4xl mb-4 text-gold"><i class="fa-solid fa-key"></i></div>
            <h2 class="font-serif text-3xl text-white mb-2">Reset Password</h2>
            <p class="text-gray-400 text-sm mb-8">Enter your new secure password below.</p>

            <form id="reset-form" class="space-y-6 text-left">
                <div>
                    <label class="form-label">New Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input id="new-password" type="password" class="form-input pl-9" placeholder="••••••••" required minlength="6"/>
                    </div>
                </div>
                <div>
                    <label class="form-label">Confirm Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-check-double absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input id="confirm-password" type="password" class="form-input pl-9" placeholder="••••••••" required minlength="6"/>
                    </div>
                </div>
                <button type="submit" id="reset-btn" class="btn-gold w-full justify-center py-3">
                    Update Password
                </button>
            </form>

            <p class="mt-8 text-xs text-gray-500">
                Remember your password? <a href="login.html" class="text-gold-light hover:underline">Return to Login</a>
            </p>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/main.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showToast('Invalid or missing token.', 'error');
        setTimeout(() => window.location.href = 'login.html', 3000);
    }

    document.getElementById('reset-form').addEventListener('submit', async e => {
        e.preventDefault();
        const pwd = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;

        if (pwd !== confirm) {
            return showToast('Passwords do not match.', 'error');
        }

        const btn = document.getElementById('reset-btn');
        btn.innerHTML = '<span class="loader"></span> Updating…'; btn.disabled = true;

        try {
            await api.auth.resetPassword({ token, password: pwd });
            showToast('Password reset successful! You can login now.', 'success');
            setTimeout(() => window.location.href = 'login.html', 2000);
        } catch (err) {
            showToast(err.message, 'error');
            btn.innerHTML = 'Update Password'; btn.disabled = false;
        }
    });
  </script>

</body>
</html>
